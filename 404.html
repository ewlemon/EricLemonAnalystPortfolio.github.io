<!DOCTYPE HTML>
<html lang="en">
<head>
	<title>404 | Eric Lemon</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="robots" content="noindex" />
	<link rel="icon" type="image/svg+xml" href="/EricLemonAnalystPortfolio.github.io/images/favicon.svg" />
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: radial-gradient(1100px 500px at 70% -10%, #10263f, #0a1930 70%);
			background-attachment: fixed;
			color: #fff;
			text-align: center;
			padding: 2rem;
		}
		.wrap { max-width: 520px; }
		.code {
			font-size: clamp(5rem, 18vw, 8.5rem);
			font-weight: 700;
			line-height: 1;
			background: linear-gradient(135deg, #06b6d4, #14b8a6);
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
		}
		.bar {
			width: 72px; height: 4px; border-radius: 4px;
			background: linear-gradient(135deg, #06b6d4, #14b8a6);
			margin: 1.2rem auto 1.4rem;
			box-shadow: 0 0 18px rgba(34,211,238,0.55);
		}
		h1 { font-size: 1.35rem; font-weight: 500; margin-bottom: 0.6rem; }
		p { color: rgba(255,255,255,0.7); font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.8rem; }
		a.home {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.75rem 1.9rem;
			border-radius: 8px;
			background: linear-gradient(135deg, #06b6d4, #14b8a6);
			color: #06283a;
			font-weight: 700;
			font-size: 0.92rem;
			text-decoration: none;
			box-shadow: 0 4px 18px rgba(20,184,166,0.35);
			transition: filter .2s, transform .15s;
		}
		a.home:hover { filter: brightness(1.08); transform: translateY(-2px); }
	</style>
</head>
<body>
	<div class="wrap">
		<div class="code">404</div>
		<div class="bar"></div>
		<h1>No data found for this query.</h1>
		<p>The page you're looking for returned zero rows. Even the best analysis starts with going back to the source.</p>
		<a class="home" href="/EricLemonAnalystPortfolio.github.io/">&#8592; Back to the portfolio</a>
	</div>
</body>
</html>
